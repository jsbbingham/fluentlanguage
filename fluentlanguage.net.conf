# HTTP -> HTTPS redirect
<VirtualHost *:80>
    ServerName fluentlanguage.net
    ServerAlias www.fluentlanguage.net

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog /home/fluentl/logs/error.log
    CustomLog /home/fluentl/logs/access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName fluentlanguage.net
    ServerAlias www.fluentlanguage.net
    DocumentRoot /home/fluentl/public_html

    <Directory /home/fluentl/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/fluentlanguage.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/fluentlanguage.net/privkey.pem

    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"

    # PHP via PHP-FPM (Remi PHP 8.3)
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/var/opt/remi/php83/run/php-fpm/fluentl.sock|fcgi://localhost"
    </FilesMatch>

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/json application/javascript
    </IfModule>

    # Cache static assets
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/svg+xml "access plus 1 month"
    </IfModule>

    # Block access to sensitive files
    <FilesMatch "\.(env|json|log|conf|md|gitignore|gitattributes)$">
        Require all denied
    </FilesMatch>

    # Block direct access to API config
    <Files "config.php">
        Require all denied
    </Files>

    ErrorLog /home/fluentl/logs/error.log
    CustomLog /home/fluentl/logs/access.log combined

    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^api/(.*)$ /api/$1 [L]
    </IfModule>
</VirtualHost>
