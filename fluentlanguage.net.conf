<VirtualHost *:80>
    ServerName fluentlanguage.net
    ServerAlias www.fluentlanguage.net
    DocumentRoot /home/fluentlan/public_html
    
    <Directory /home/fluentlan/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog /home/fluentlan/logs/error.log
    CustomLog /home/fluentlan/logs/access.log combined
    
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^api/(.*)$ /api/$1 [L]
    </IfModule>
</VirtualHost>
